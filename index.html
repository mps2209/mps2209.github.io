<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Gehweg — Draufsicht-Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #0a2235;
    color: #c9e8ff;
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
  }
  #root {
    min-height: 100vh;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .app-shell {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    flex-direction: column;
    padding: 18px 18px 14px;
    gap: 8px;
  }
  .app-header { flex: 0 0 auto; }
  .app-svg {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .app-svg svg { width: 100%; height: 100%; display: block; }
  .app-legend { flex: 0 0 auto; }
  .blueprint-bg {
    background-color: #0a2235;
    background-image:
      linear-gradient(rgba(120, 190, 240, 0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(120, 190, 240, 0.06) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  ::selection { background: #1a8cff; color: #fff; }
</style>
</head>
<body class="blueprint-bg">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="plan.jsx"></script>
</body>
</html>
